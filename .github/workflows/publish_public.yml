name: Publish V2RAY_RAW to public repo

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Push file to public repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail
          PUBLIC_REPO="elnemr4011/Proxy-Public"
          FILE="V2RAY_RAW.txt"

          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE"
            exit 1
          fi

          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

          rm -rf out
          git clone "https://x-access-token:${SYNC_TOKEN}@github.com/${PUBLIC_REPO}.git" out

          cp "$FILE" "out/$FILE"

          cd out
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git add "$FILE"
          git commit -m "Update $FILE"
          git push
